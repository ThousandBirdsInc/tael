[package]
name = "tael-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
description = "AI-agent-native observability — a single `tael` binary that runs the OTLP ingest/storage server (`tael serve`) and queries, visualizes, and annotates traces"

# `cargo binstall tael-cli` downloads a prebuilt binary from the GitHub Release
# for the matching `v{version}` tag instead of compiling from source. Archive
# layout and tag naming are produced by .github/workflows/release.yml.
[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/tael-cli-v{ version }-{ target }.tar.gz"
pkg-fmt = "tgz"
bin-dir = "tael-cli-v{ version }-{ target }/{ bin }{ binary-ext }"

[[bin]]
name = "tael"
path = "src/main.rs"

[dependencies]
tael-server = { path = "../tael-server", version = "0.4.2" }
anyhow.workspace = true
chrono.workspace = true
clap.workspace = true
comfy-table.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
crossterm.workspace = true
ratatui.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
