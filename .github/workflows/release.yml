name: release

# Build prebuilt `tael` binaries on every `v*` tag, attach them to the
# matching GitHub Release, then publish the crates to crates.io. This is what
# makes `cargo binstall tael-cli` fast: binstall downloads one of these
# archives instead of compiling the bundled DuckDB C++ amalgamation (~1.4 GB
# of object code) from source.
#
# Normally dispatched at the tag by the `cut-release` workflow (tags pushed
# with GITHUB_TOKEN don't fire `on: push`), but a manually pushed tag still
# triggers it too.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail fast if the pushed tag doesn't match the workspace version, so we never
  # publish a `v{version}` release whose binaries binstall can't resolve (the
  # binstall URL is derived from the crate version, not the tag).
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches Cargo.toml version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=$tag cargo=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match workspace version '$version' in Cargo.toml"
            exit 1
          fi

  build:
    name: ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux on older glibc (22.04) for broader binary compatibility.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          # Both macOS targets build on the Apple-Silicon runner (macos-14):
          # aarch64 natively, x86_64 via cross-compile. macos-13 (Intel) runners
          # are scarce and can queue for hours, so we avoid them.
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          # No Windows target: the WAL dependency (walrus-rust) uses unix-only
          # positioned file I/O (std::os::unix::fs::FileExt), so tael does not
          # build on Windows — via this workflow or `cargo install`.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build only the CLI crate (it pulls in tael-server). The `gui` feature is
      # opt-in (default = []), so the prebuilt binary stays headless and never
      # links webkit/GTK — that's what lets `cargo binstall tael-cli` run on a
      # server/container without `libgdk-3.so.0`. No Tauri build deps needed.
      # Native target on each runner, so bundled native deps compile with the
      # host toolchain.
      - name: Build
        run: cargo build --release --locked -p tael-cli --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="tael-cli-v${version}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/tael" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          tar czf "$stage.tar.gz" "$stage"
          echo "ASSET=$stage.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Publish to crates.io only after every binary is attached to the release,
  # so `cargo binstall tael-cli` never sees a version whose prebuilt archives
  # don't exist yet. Publish order matters: tael-cli's packaged verification
  # resolves tael-server and tael-gui from the registry, and `cargo publish`
  # (1.66+) blocks until each crate is indexed before returning.
  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tael-gui's publish verification compiles the Tauri app crate, which
      # links webkit/GTK on Linux.
      - name: Install Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set (create one at https://crates.io/settings/tokens)"
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          for crate in tael-server tael-gui tael-cli; do
            # Skip crates already published so a partially failed run can be
            # re-run without erroring on the ones that made it through.
            if curl -fsSo /dev/null -A "tael-release-ci (github.com/${GITHUB_REPOSITORY})" \
                "https://crates.io/api/v1/crates/${crate}/${version}"; then
              echo "==> ${crate} ${version} already on crates.io, skipping"
              continue
            fi
            echo "==> Publishing ${crate} ${version}..."
            cargo publish -p "$crate" --locked
          done
