    <line x1="574.3" y1="158" x2="574.3" y2="315" stroke="#2dd4bf" stroke-opacity="0.08" stroke-width="1"/>
    <text x="578.3" y="154" fill="#3f8a7d" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="11">2s</text>
    <line x1="831.4" y1="158" x2="831.4" y2="315" stroke="#2dd4bf" stroke-opacity="0.08" stroke-width="1"/>
    <text x="835.4" y="154" fill="#3f8a7d" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="11">3s</text>
    <line x1="1088.6" y1="158" x2="1088.6" y2="315" stroke="#2dd4bf" stroke-opacity="0.08" stroke-width="1"/>
    <text x="1092.6" y="154" fill="#3f8a7d" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="11">4s</text>

