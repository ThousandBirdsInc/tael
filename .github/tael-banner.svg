<svg viewBox="0 0 1200 360" width="1200" height="360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02100e"/>
      <stop offset="0.5" stop-color="#04130f"/>
      <stop offset="1" stop-color="#061a14"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="600" cy="245" r="640" gradientUnits="userSpaceOnUse" gradientTransform="matrix(1 0 0 0.42 0 142)">
      <stop offset="0" stop-color="#0c3b32" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0c3b32" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="600" cy="180" r="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="phGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cf2e0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7cf2e0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7cf2e0" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="reveal">
      <rect x="60" y="154" width="0" height="200">
        <animate attributeName="width" dur="6.0s" repeatCount="indefinite"
                 keyTimes="0;0.62;0.93;1" values="0;1080;1080;0"/>
      </rect>
    </clipPath>

    <style>
      @keyframes hotpulse { 0%,100% { opacity:.25 } 50% { opacity:.9 } }
      .hot { animation: hotpulse 1.7s ease-in-out infinite; }
      @keyframes fadeloop { 0% {opacity:0} 5% {opacity:1} 90% {opacity:1} 99%,100% {opacity:0} }
      .replay { animation: fadeloop 6.0s linear infinite; }
      @media (prefers-reduced-motion: reduce) {
        .hot { animation: none !important; opacity:.6 }
        .replay { animation: none !important; opacity:1 }
      }
    </style>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glowbg)"/>

  <!-- wordmark + tagline -->
  <text x="60" y="96" fill="#2dd4bf" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="78" font-weight="700" letter-spacing="3">tael</text>
  <text x="64" y="126" fill="#5ec8b8" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="16" letter-spacing="0.5">AI-agent-native observability · OTLP traces · logs · metrics</text>

  <!-- trace caption (top-right) -->
  <text x="1140" y="96" text-anchor="end" fill="#3f8a7d" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="13">trace 7f3a…c1 · 4.2s · 12 spans</text>
  <text x="1140" y="126" text-anchor="end" fill="#fbbf24" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="13" opacity="0.85">▮ gen_ai.chat · 847 tok · $0.0123</text>

  <!-- time ruler -->
