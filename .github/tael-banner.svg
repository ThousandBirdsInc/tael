      <text x="346.7" y="247" fill="#04201b" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="12" font-weight="600">inference</text>
      <rect x="339.7" y="260" width="383.7" height="25" rx="2.5" fill="#fb923c"/>
      <text x="346.7" y="277" fill="#04201b" font-family="'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="12" font-weight="600">decode tokens</text>
      <rect x="905.4" y="230" width="39.1" height="25" rx="2.5" fill="#fbbf24"/>
