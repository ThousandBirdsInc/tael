      <rect x="1064.9" y="200" width="21.1" height="25" rx="2.5" fill="#34d399"/>
    <rect class="hot" x="303.7" y="200" width="666.6" height="25" rx="2.5" fill="none" stroke="#ffe7a0" stroke-width="1.5"/>
    <rect class="hot" x="339.7" y="230" width="563.7" height="25" rx="2.5" fill="none" stroke="#ffe7a0" stroke-width="1.5"/>
    </g>

    <!-- playhead riding the reveal edge -->
    <rect x="60" y="158" width="2" height="157" fill="url(#phGrad)">
      <animate attributeName="x" dur="6.0s" repeatCount="indefinite"
               keyTimes="0;0.62;0.93;1" values="60;1140;1140;60"/>
    </rect>
    <circle cx="60" cy="158" r="3.5" fill="#7cf2e0">
      <animate attributeName="cx" dur="6.0s" repeatCount="indefinite"
               keyTimes="0;0.62;0.93;1" values="60;1140;1140;60"/>
    </circle>
  </g>

  <rect width="1200" height="360" fill="url(#vignette)"/>
</svg>
